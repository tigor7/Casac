<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="frame">
    <div class="container">

        <div class="left">
            <div class="login">
                <h1>CASAC</h1>

                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="login-btn">INICIAR SESIÓN</button>

                <br>

                <a class="forgot" href="#">¿Olvidaste la contraseña?</a>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">o</span>
                    <span class="line"></span>
                </div>

                <button class="google-btn">
                    Inicia sesión con Google <span class="g">G</span>
                </button>

                <p class="small">¿Aún no tienes cuenta?</p>
                <a class="create" href="#">Crear cuenta</a>
            </div>
        </div>

        <div class="right">
            <img src="img/ferreteria-stock.jpg" alt="Imagen de herramientas">
        </div>

    </div>
</div>

</body>
</html>
