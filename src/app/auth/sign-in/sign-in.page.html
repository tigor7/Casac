<div class="hamburger-mobile" id="hamburger-toggle-auth">
    <span></span>
    <span></span>
    <span></span>
</div>

<nav class="mobile-menu-auth" id="mobile-menu-auth">
    <ul>
        <li><a href="shop.html">Tienda</a></li>
        <li><a href="cart.html">Carrito</a></li>
        <li><a href="sign-in.html" data-auth-link>Iniciar sesion</a></li>
    </ul>
</nav>

<div class="frame">
    <div class="container">
        <div class="left">
            <div class="login">
                <h1><a routerLink="/">CASAC</a></h1>

                <form id="login-form" novalidate (submit)="onSubmit($event)">
                    <div class="form-error" *ngIf="loginForm.email().touched() && loginForm.email().invalid()">
                        <small>Introduce un email valido.</small>
                    </div>
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        autocomplete="email"
                        [formField]="loginForm.email"
                    />

                    <div class="form-error" *ngIf="loginForm.password().touched() && loginForm.password().invalid()">
                        <small>La contrasena debe tener al menos 6 caracteres.</small>
                    </div>
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        autocomplete="current-password"
                        [formField]="loginForm.password"
                    />

                    <button class="login-btn" type="submit" [disabled]="loginForm().invalid()">
                        INICIAR SESION
                    </button>
                </form>
                <p class="small">Cliente: demo@casac.com / casac123</p>
                <p class="small">Admin: admin@casac.com / admin123</p>

                <a class="forgot" href="#">Olvidaste la contrasena?</a>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">o</span>
                    <span class="line"></span>
                </div>

                <button class="google-btn" type="button">
                    <span>Inicia sesion con Google</span>
                    <span class="g-icon">G</span>
                </button>

                <div class="footer-auth">
                    <p class="small">Aun no tienes cuenta?</p>
                    <a class="create" routerLink="/create-account">Crear cuenta</a>
                </div>
            </div>
        </div>

        <div class="right">
            <img src="ferreteria-stock.jpg" alt="Imagen de herramientas" />
        </div>
    </div>
</div>
