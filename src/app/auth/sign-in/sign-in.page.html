    <span></span>

<nav class="mobile-menu-auth" id="mobile-menu-auth">
    <ul>
        <li><a href="shop.html">Tienda</a></li>
        <li><a href="cart.html">Carrito</a></li>
        <li><a href="sign-in.html" data-auth-link>Iniciar sesión</a></li>

<div class="frame">
    <div class="container">
        <div class="left">
            <div class="login">
                <h1><a href="home.html">CASAC</a></h1>

                <form id="login-form" action="profile.html">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Email"
                        required
                        autocomplete="email"
                    />

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required
                        minlength="6"
                        autocomplete="current-password"
                    />

                    <button class="login-btn" type="submit">INICIAR SESIÓN</button>
                </form>
                <p class="small">Cliente: demo@casac.com / casac123</p>
                <p class="small">Admin: admin@casac.com / admin123</p>

                <a class="forgot" href="#">¿Olvidaste la contraseña?</a>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">o</span>
                    <span class="line"></span>
                </div>

                <button class="google-btn" type="button">
                    <span>Inicia sesión con Google</span>
                    <span class="g-icon">G</span>
                </button>

                <div class="footer-auth">
                    <p class="small">¿Aún no tienes cuenta?</p>
                    <a class="create" routerLink="/create-account">Crear cuenta</a>
                </div>
            </div>
        </div>

        <div class="right">
            <img src="ferreteria-stock.jpg" alt="Imagen de herramientas" />
        </div>
    </div>
</div>
