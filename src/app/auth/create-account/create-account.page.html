<div class="frame">
    <div class="container">
        <div class="left">
            <div class="login">
                <h1><a routerLink="/">CASAC</a></h1>

                <form id="register-form" novalidate (submit)="onSubmit($event)">
                    <div class="row">
                        <div
                            class="form-error"
                            *ngIf="
                                registrationForm.username().touched() &&
                                registrationForm.username().invalid()
                            "
                        >
                            <small>El usuario es obligatorio y debe tener 4 caracteres.</small>
                        </div>
                        <input
                            class="half"
                            type="text"
                            id="username"
                            placeholder="Usuario"
                            [formField]="registrationForm.username"
                        />

                        <div
                            class="form-error"
                            *ngIf="
                                registrationForm.phone().touched() &&
                                registrationForm.phone().invalid()
                            "
                        >
                            <small>Introduce un telefono valido de 9 digitos.</small>
                        </div>
                        <input
                            class="half"
                            type="tel"
                            id="phone"
                            placeholder="Telefono"
                            [formField]="registrationForm.phone"
                        />
                    </div>

                    <div
                        class="form-error"
                        *ngIf="
                            registrationForm.fullname().touched() &&
                            registrationForm.fullname().invalid()
                        "
                    >
                        <small>El nombre completo es obligatorio.</small>
                    </div>
                    <input
                        type="text"
                        id="fullname"
                        placeholder="Nombre y apellidos"
                        [formField]="registrationForm.fullname"
                    />

                    <div
                        class="form-error"
                        *ngIf="
                            registrationForm.email().touched() && registrationForm.email().invalid()
                        "
                    >
                        <small>Introduce un email valido.</small>
                    </div>
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        [formField]="registrationForm.email"
                    />

                    <div
                        class="form-error"
                        *ngIf="
                            registrationForm.password().touched() &&
                            registrationForm.password().invalid()
                        "
                    >
                        <small>La contrasena debe tener al menos 6 caracteres.</small>
                    </div>
                    <input
                        type="password"
                        id="password"
                        placeholder="Contrasena"
                        [formField]="registrationForm.password"
                    />

                    <button
                        class="login-btn"
                        type="submit"
                        [disabled]="registrationForm().invalid()"
                    >
                        CREAR
                    </button>
                </form>

                <br />
                <a class="forgot" routerLink="/create-company-account">Eres una empresa?</a>
            </div>
        </div>

        <div class="right">
            <img src="ferreteria-stock.jpg" alt="Imagen de herramientas" />
        </div>
    </div>
</div>
