<div class="frame">
    <div class="container">
        <div class="left">
            <div class="login">
                <h1><a routerLink="/">CASAC</a></h1>

                <form id="company-register-form" novalidate (submit)="onSubmit($event)">
                    <div class="row">
                        <div class="form-error" *ngIf="companyForm.cif().touched() && companyForm.cif().invalid()">
                            <small>Introduce un CIF valido.</small>
                        </div>
                        <input
                            class="half"
                            type="text"
                            id="cif"
                            placeholder="CIF"
                            [formField]="companyForm.cif"
                        />

                        <div class="form-error" *ngIf="companyForm.phone().touched() && companyForm.phone().invalid()">
                            <small>Introduce un telefono valido de 9 digitos.</small>
                        </div>
                        <input
                            class="half"
                            type="tel"
                            id="phone"
                            placeholder="Telefono"
                            [formField]="companyForm.phone"
                        />
                    </div>

                    <div class="form-error" *ngIf="companyForm.companyName().touched() && companyForm.companyName().invalid()">
                        <small>El nombre de la empresa es obligatorio.</small>
                    </div>
                    <input
                        type="text"
                        id="company-name"
                        placeholder="Nombre de la empresa"
                        [formField]="companyForm.companyName"
                    />

                    <div class="form-error" *ngIf="companyForm.email().touched() && companyForm.email().invalid()">
                        <small>Introduce un email valido.</small>
                    </div>
                    <input
                        type="email"
                        id="email"
                        placeholder="Correo de contacto"
                        [formField]="companyForm.email"
                    />

                    <div class="form-error" *ngIf="companyForm.password().touched() && companyForm.password().invalid()">
                        <small>La contrasena debe tener al menos 6 caracteres.</small>
                    </div>
                    <input
                        type="password"
                        id="password"
                        placeholder="Contrasena"
                        [formField]="companyForm.password"
                    />

                    <button class="login-btn" type="submit" [disabled]="companyForm().invalid()">CREAR</button>
                </form>
            </div>
        </div>

        <div class="right">
            <img src="ferreteria-stock.jpg" alt="Imagen de herramientas" />
        </div>
    </div>
</div>
