<h1 class="profile-section-title">Configuracion del Perfil</h1>

<form class="profile-form" novalidate (submit)="onSubmit($event)">
    <div class="form-group">
        <label>Nombre Completo</label>
        <div class="form-error" *ngIf="profileForm.fullname().touched() && profileForm.fullname().invalid()">
            <small>Introduce un nombre valido.</small>
        </div>
        <input type="text" placeholder="Escribe tu nombre" [formField]="profileForm.fullname" />
    </div>

    <div class="form-group">
        <label>Correo Electronico</label>
        <div class="form-error" *ngIf="profileForm.email().touched() && profileForm.email().invalid()">
            <small>Introduce un email valido.</small>
        </div>
        <input type="email" placeholder="tu@email.com" [formField]="profileForm.email" />
    </div>

    <div class="form-group">
        <label>Telefono de Contacto</label>
        <div class="form-error" *ngIf="profileForm.phone().touched() && profileForm.phone().invalid()">
            <small>Introduce un telefono valido.</small>
        </div>
        <input type="tel" placeholder="+34..." [formField]="profileForm.phone" />
    </div>

    <div class="form-group">
        <label>Ciudad / Provincia</label>
        <div class="form-error" *ngIf="profileForm.city().touched() && profileForm.city().invalid()">
            <small>La ciudad es obligatoria.</small>
        </div>
        <input type="text" placeholder="Tu ciudad" [formField]="profileForm.city" />
    </div>

    <div class="form-footer">
        <button type="submit" class="save-btn" [disabled]="profileForm().invalid()">GUARDAR CAMBIOS</button>
    </div>
</form>
