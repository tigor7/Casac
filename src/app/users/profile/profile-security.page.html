<h1 class="profile-section-title">Seguridad</h1>

<form class="profile-form" novalidate (submit)="onSubmit($event)">
    <div class="form-group">
        <label>Contrasena Actual</label>
        <div class="form-error" *ngIf="securityForm.currentPassword().touched() && securityForm.currentPassword().invalid()">
            <small>Introduce tu contrasena actual.</small>
        </div>
        <input type="password" placeholder="******" [formField]="securityForm.currentPassword" />
    </div>

    <div class="form-group">
        <label>Nueva Contrasena</label>
        <div class="form-error" *ngIf="securityForm.newPassword().touched() && securityForm.newPassword().invalid()">
            <small>Minimo 6 caracteres.</small>
        </div>
        <input type="password" placeholder="******" [formField]="securityForm.newPassword" />
    </div>

    <div class="form-group">
        <label>Confirmar Contrasena</label>
        <div class="form-error" *ngIf="securityForm.confirmPassword().touched() && securityForm.confirmPassword().invalid()">
            <small>Confirma la nueva contrasena.</small>
        </div>
        <div class="form-error" *ngIf="securityForm.confirmPassword().touched() && passwordsMismatch">
            <small>Las contrasenas no coinciden.</small>
        </div>
        <input type="password" placeholder="******" [formField]="securityForm.confirmPassword" />
    </div>

    <div class="form-footer">
        <button type="submit" class="save-btn" [disabled]="securityForm().invalid() || passwordsMismatch">
            GUARDAR CAMBIOS
        </button>
    </div>
</form>
