<article class="shop-card">
    <div class="shop-card-img">
        <img [src]="product()?.img" alt="Producto" class="prod-img" />
    </div>
    <div class="shop-card-info">
        <p class="shop-desc">{{ product()?.shortDescription }}</p>
        <span class="shop-price">{{ product()?.price }}€</span>
        <a [routerLink]="['/product', product()?.id]">
            <button class="add-btn">Ver producto</button>
        </a>
    </div>
</article>
