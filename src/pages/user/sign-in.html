<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAC - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="../../styles/user/auth.css">
</head>
<body>

<div class="hamburger-mobile" id="hamburger-toggle-auth">
    <span></span>
    <span></span>
    <span></span>
</div>

<nav class="mobile-menu-auth" id="mobile-menu-auth">
    <ul>
        <li><a href="shop.html">Tienda</a></li>
        <li><a href="cart.html">Carrito</a></li>
        <li><a href="sign-in.html" data-auth-link>Iniciar sesión</a></li>
    </ul>
</nav>

<div class="frame">
    <div class="container">

        <div class="left">
            <div class="login">
                <h1><a href="home.html">CASAC</a></h1>

                <form id="login-form" action="profile.html">

                    <input type="email" id="email" name="email" placeholder="Email" required>

                    <input type="password" id="password" name="password" placeholder="Password" required>

                    <button class="login-btn" type="submit">INICIAR SESIÓN</button>
                </form>
                <p class="small">Cuenta de prueba: demo@casac.com / casac123</p>

                <a class="forgot" href="#">¿Olvidaste la contraseña?</a>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">o</span>
                    <span class="line"></span>
                </div>

                <button class="google-btn" type="button">
                    <span>Inicia sesión con Google</span>
                    <span class="g-icon">G</span>
                </button>

                <div class="footer-auth">
                    <p class="small">¿Aún no tienes cuenta?</p>
                    <a class="create" href="create-account.html">Crear cuenta</a>
                </div>
            </div>
        </div>

        <div class="right">
            <img src="../../../img/ferreteria-stock.jpg" alt="Imagen de herramientas">
        </div>

    </div>
</div>

<script src="../../scripts/hamburger.js"></script>

</body>
</html>
