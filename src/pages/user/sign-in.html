<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAC - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="../../styles/user/auth.css">
</head>
<body>

<div class="frame">
    <div class="container">

        <div class="left">
            <div class="login">
                <h1>CASAC</h1>

                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="login-btn" onclick="window.location.href='profile.html'">INICIAR SESIÓN</button>

                <a class="forgot" href="#">¿Olvidaste la contraseña?</a>

                <div class="divider">
                    <span class="line"></span>
                    <span class="or">o</span>
                    <span class="line"></span>
                </div>

                <button class="google-btn" onclick="window.location.href='profile.html'">
                    <span>Inicia sesión con Google</span>
                    <span class="g-icon">G</span>
                </button>

                <div class="footer-auth">
                    <p class="small">¿Aún no tienes cuenta?</p>
                    <a class="create" href="create-account.html">Crear cuenta</a>
                </div>
            </div>
        </div>

        <div class="right">
            <img src="../../../img/ferreteria-stock.jpg" alt="Imagen de herramientas">
        </div>

    </div>
</div>

</body>
</html>
