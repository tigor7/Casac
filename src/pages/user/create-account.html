<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAC - Registro</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="../../styles/user/auth.css">
</head>
<body class="has-layout-header-footer">

<div class="frame">
    <div class="container">

        <div class="left">
            <div class="login">
                <h1>CASAC</h1>

                <form id="register-form" action="profile.html">
                    <div class="row">
                        <input class="half" type="text" id="username" name="username" placeholder="Usuario" required minlength="4" title="El usuario debe tener al menos 4 caracteres">

                        <input class="half" type="tel" id="phone" name="phone" placeholder="Teléfono" required pattern="[0-9]{9}" title="Introduce un número de teléfono válido de 9 dígitos">
                    </div>

                    <input type="text" id="fullname" name="fullname" placeholder="Nombre y apellidos" required>

                    <input type="email" id="email" name="email" placeholder="Email" required>

                    <input type="password" id="password" name="password" placeholder="Contraseña" required minlength="6" title="La contraseña debe tener al menos 6 caracteres">

                    <button class="login-btn" type="submit">CREAR</button>
                </form>

                <br>
                <a class="forgot" href="create-company-account.html">¿Eres una empresa?</a>
            </div>
        </div>

        <div class="right">
            <img src="../../../img/ferreteria-stock.jpg" alt="Imagen de herramientas">
        </div>
    </div>
</div>
</body>
</html>
