<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAC - Registro</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="../../styles/user/auth.css">
</head>
<body>

<div class="frame">
    <div class="container">

        <div class="left">
            <div class="login">
                <h1>CASAC</h1>

                <div class="row">
                    <input class="half" type="text" placeholder="Usuario">
                    <input class="half" type="tel" placeholder="Teléfono">
                </div>

                <input type="text" placeholder="Nombre y apellidos">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Contraseña">

                <button class="login-btn" onclick="window.location.href='profile.html'">CREAR</button>
                <br>
                <a class="forgot" href="create-company-account.html">¿Eres una empresa?</a>
            </div>
        </div>

        <div class="right">
            <img src="../../../img/ferreteria-stock.jpg" alt="Imagen de herramientas">
        </div>
    </div>
</div>
</body>
</html>
