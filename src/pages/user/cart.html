<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - CASAC</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="../../styles/user/cart.css">
    <script src="../../xlu-include-file.js"></script>
</head>
<body>

<header xlu-include-file="../../templates/user/header.html"></header>

<main class="main-content cart-layout">
    <div class="cart-container-xl">

        <div class="cart-main-panel">
            <div class="cart-table-header">
                <span class="head-prod">Producto</span>
                <span class="head-del">Eliminar</span>
                <span class="head-qty">Cantidad</span>
                <span class="head-price">Precio</span>
            </div>

            <div class="cart-product-row">
                <div class="cell-product">
                    <div class="product-img-box">
                        <img src="../../../img/tornillo.png" alt="Producto">
                    </div>
                    <span class="product-title">Tornillo Philips</span>
                </div>
                <div class="cell-delete">
                    <button class="icon-del">✕</button>
                </div>
                <div class="cell-qty">
                    <div class="qty-selector">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="cell-price">
                    <span class="price-value">0,00€</span>
                </div>
            </div>

            <div class="cart-product-row">
                <div class="cell-product">
                    <div class="product-img-box">
                        <img src="../../../img/tornillo.png" alt="Producto">
                    </div>
                    <span class="product-title">Tornillo Philips</span>
                </div>
                <div class="cell-delete">
                    <button class="icon-del">✕</button>
                </div>
                <div class="cell-qty">
                    <div class="qty-selector">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="cell-price">
                    <span class="price-value">0,00€</span>
                </div>
            </div>
        </div>

        <aside class="cart-summary-panel">
            <h2>Resumen</h2>

            <div class="coupon-section">
                <input type="text" placeholder="Código de descuento">
                <button class="apply-btn">Aplicar</button>
            </div>

            <div class="summary-details">
                <div class="detail-labels">
                    <p>Subtotal</p>
                    <p>Envío</p>
                    <p>Impuestos</p>
                </div>
                <div class="detail-values">
                    <p>0,00€</p>
                    <p>Gratis</p>
                    <p>0,00€</p>
                </div>
            </div>

            <div class="total-box">
                <span>Total</span>
                <span>0,00€</span>
            </div>

            <div class="checkout-footer">
                <button class="main-pay-btn">FINALIZAR COMPRA</button>
            </div>
        </aside>

    </div>
</main>

<footer xlu-include-file="../../templates/user/footer.html"></footer>
<script>xLuIncludeFile();</script>
</body>
</html>
