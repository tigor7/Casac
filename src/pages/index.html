<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inicio - CASAC</title>

    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/index.css">

    <script src="../xlu-include-file.js"></script>
</head>
<body>

<header xlu-include-file="../templates/header.html"></header>

<main class="main-content">
    <div class="search-row">
        <input type="text" placeholder="Buscar productos...">
        <button>Buscar</button>
    </div>

    <div class="top-section">
        <aside class="sidebar">
            <a href="#jardineria">Jardinería</a>
            <a href="#carpinteria">Carpintería</a>
            <a href="#fontaneria">Fontanería</a>
            <a href="#albanileria">Albañilería</a>
            <a href="#electricidad">Electricidad</a>
            <a href="#tornilleria">Tornillería</a>
            <a href="#cerrajeria">Cerrajería</a>
        </aside>
        <div class="hero">
            <img src="../../img/imgHome.jpg" alt="Ferretería">
        </div>
    </div>

    <div class="cards-grid" id="grid-productos"></div>
</main>

<footer xlu-include-file="../templates/footer.html"></footer>

<script>
    // Inyectamos Header y Footer
    xLuIncludeFile();

    // Creamos los 9 productos
    const grid = document.getElementById('grid-productos');
    let tarjetasHTML = '';
    for(let i=0; i<9; i++) {
        tarjetasHTML += `
            <div class="card">
                <div class="card-img">
                    <span style="font-size: 12px; color: #aaa;">Foto</span>
                </div>
                <div class="card-info">
                    <div>
                        <h3>Producto ${i+1}</h3>
                        <p>Descripción minimalista y elegante.</p>
                    </div>
                    <button>Añadir al carro</button>
                </div>
            </div>
            `;
    }
    grid.innerHTML = tarjetasHTML;
</script>

</body>
</html>
