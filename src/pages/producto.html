<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Producto - CASAC</title>
    <link rel="stylesheet" href="../../styles.css" />
</head>
<body>
    <header id="main-header" xlu-include-file="../templates/header.html"></header>
    <script src="../xlu-include-file.js"></script>

    <!-- CONTENIDO -->
    <main class="page">
        <div class="card">
            <!-- Imagen -->
            <div class="img-box">
                <img src="tornillo.png" alt="Tornillo">
            </div>

            <!-- Info producto -->
            <div class="info">
                <h1>Tornillos</h1>
                <p class="subtitle">Tornillo philips</p>

                <div class="buy-row">
                    <div class="pack">100cts</div>

                    <div class="qty">
                        <button type="button" class="qty-btn">+</button>
                        <span class="qty-num">1</span>
                        <button type="button" class="qty-btn">-</button>
                    </div>
                </div>

                <button class="add-btn" type="button">
                    <span class="bag">👜</span>
                    Agregar al carrito
                </button>
            </div>

        </div>
    </main>

    <script>
        xLuIncludeFile();
    </script>

</body>
</html>
