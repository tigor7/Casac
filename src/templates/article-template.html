<div class="card" style="cursor: pointer;" onclick="redirectToArticle(event, this)" data-title="{{title}}" data-subtitle="{{subtitle}}" data-content="{{content}}" data-image="{{image}}">
  <div class="card-left">
    <div class="cross-box"></div>
    <button>button</button>
  </div>
  <div class="card-right">
    <h3>{{title}}</h3>
    <h4>{{subtitle}}</h4>
    <p>{{content}}</p>
  </div>
</div>
