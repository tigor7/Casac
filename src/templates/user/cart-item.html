<div class="cart-product-row" id="{{id}}">
    <div class="cell-product">
        <div class="product-img-box">
            <img src="{{img}}" alt="Producto">
        </div>
        <span class="product-title">{{name}}</span>
    </div>
    <div class="cell-delete">
        <button class="icon-del" onclick="removeCartItem({{id}})">✕</button>
    </div>
    <div class="cell-qty">
        <div class="qty-selector">
            <button type="button" onclick="changeCartItemQuantity({{id}}, -1)">-</button>
            <span>{{quantity}}</span>
            <button type="button" onclick="changeCartItemQuantity({{id}}, 1)">+</button>
        </div>
    </div>
    <div class="cell-price">
        <span class="price-value">{{price}}€</span>
    </div>
</div>
