<div class="user-order-card">
  <div class="u-order-header">
    <div class="u-info">
      <span>PEDIDO #{{orderCode}}</span>
      <strong>{{date}}</strong>
    </div>
    <div class="u-status-badge {{statusClass}}">{{statusLabel}}</div>
  </div>
  <div class="u-order-body">
    <div class="u-items-list">
      {{itemsMarkup}}
    </div>
    <div class="u-order-total">
      <span>Total pedido</span>
      <strong>{{total}}</strong>
    </div>
  </div>
</div>
