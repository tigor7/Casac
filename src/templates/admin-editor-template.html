<div class="admin-editor-layout">
    <div class="editor-left">
        <div class="image-upload-container">
            <div class="upload-placeholder">＋</div>
            <button class="btn-mini">Subir Imagen</button>
        </div>
    </div>

    <div class="editor-right">
        <div class="input-inline">
            <input type="text" placeholder="Título del producto" class="full-input">
            <button class="btn-mini">Editar</button>
        </div>

        <textarea placeholder="Descripción del producto..." class="editor-textarea"></textarea>

        <div class="editor-stats-row">
            <div class="stat-item">
                <div class="inner-input">
                    <input type="text" value="0.00€">
                    <button class="btn-mini">Precio</button>
                </div>
            </div>
            <div class="stat-item">
                <div class="inner-input">
                    <input type="text" value="0%">
                    <button class="btn-mini">Descuento</button>
                </div>
            </div>
        </div>

        <button class="main-admin-save">GUARDAR PRODUCTO</button>
    </div>
</div>
